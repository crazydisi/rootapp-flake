name: RootApp Auto-Update

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: "Re-prefetch even when upstream Last-Modified is unchanged"
        type: boolean
        default: false

concurrency:
  group: rootapp-auto-update
  cancel-in-progress: false

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Probe upstream Last-Modified
        id: probe
        run: |
          set -euo pipefail
          url="https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"
          last_modified=$(curl -sI "$url" | grep -i '^last-modified:' | sed 's/^[Ll]ast-[Mm]odified: //I; s/\r$//')
          new_version="unstable-$(date -u -d "$last_modified" +%Y-%m-%d)"
          old_version=$(grep -oP 'version = "\K[^"]+' flake.nix)
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "old_version=$old_version" >> "$GITHUB_OUTPUT"
          if [ "$old_version" = "$new_version" ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "needs_work=0" >> "$GITHUB_OUTPUT"
            echo "Upstream unchanged ($old_version) — skipping prefetch and build."
          else
            echo "needs_work=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Nix
        if: steps.probe.outputs.needs_work == '1'
        uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Restore Nix store cache
        if: steps.probe.outputs.needs_work == '1'
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Prefetch hashes and rewrite flake.nix
        id: update
        if: steps.probe.outputs.needs_work == '1'
        run: |
          set -euo pipefail

          declare -A URLS=(
            [x86_64-linux]="https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"
            [aarch64-linux]="https://installer.rootapp.com/installer/Linux/Arm64/Root.AppImage"
          )

          changed=0
          summary=""

          for system in "${!URLS[@]}"; do
            url="${URLS[$system]}"
            new_hash=$(nix store prefetch-file "$url" --json | jq -r .hash)
            old_hash=$(grep -A2 "$system = {" flake.nix | grep -oP 'hash = "\K[^"]+' || true)

            echo "system=$system old=$old_hash new=$new_hash"

            if [ "$old_hash" != "$new_hash" ]; then
              sed -i "s|$old_hash|$new_hash|g" flake.nix
              changed=1
              summary="${summary}- ${system}: ${new_hash}"$'\n'
            fi
          done

          old_version="${{ steps.probe.outputs.old_version }}"
          new_version="${{ steps.probe.outputs.new_version }}"
          if [ "$old_version" != "$new_version" ]; then
            sed -i "s|version = \"$old_version\"|version = \"$new_version\"|" flake.nix
            changed=1
            summary="${summary}- version: ${new_version}"$'\n'
          fi

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          {
            echo "summary<<EOF"
            echo "$summary"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Verify build
        if: steps.update.outputs.changed == '1'
        run: nix flake check --print-build-logs

      - name: Commit and push
        if: steps.update.outputs.changed == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore: auto-update RootApp AppImage [skip ci]" \
                     -m "${{ steps.update.outputs.summary }}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push

      - name: No-op log
        if: steps.probe.outputs.needs_work == '0' || steps.update.outputs.changed != '1'
        run: echo "AppImages and version are up to date."
